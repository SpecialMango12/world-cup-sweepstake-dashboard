<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Family World Cup 2026 Sweepstake</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="app-header">
    <div class="header-glow"></div>
    <div class="container-xl">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
          <div class="trophy">🏆</div>
          <div>
            <h1 class="app-title">Family World Cup 2026 Sweepstake</h1>
            <p class="app-subtitle">FIFA World Cup 2026 · USA · Mexico · Canada</p>
          </div>
        </div>
        <div class="header-status text-end">
          <div id="liveBadge" class="live-badge"><span class="dot"></span> LIVE</div>
          <div class="updated-text">Updated <span id="lastUpdated">–</span></div>
          <div class="d-flex gap-2 justify-content-end mt-1">
            <button id="refreshBtn" class="btn btn-sm btn-refresh">
              <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
            <a href="setup.html" class="btn btn-sm btn-refresh" title="Reconfigure sweepstake">
              <i class="bi bi-gear-fill"></i> Setup
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== Members legend ===== -->
  <section class="legend-section">
    <div class="container-xl">
      <div id="legend" class="legend-grid"></div>
    </div>
  </section>

  <!-- ===== Head-to-head filter ===== -->
  <section class="container-xl">
    <div class="h2h-card">
      <div class="h2h-head">
        <div>
          <h2 class="section-title mb-0"><i class="bi bi-people-fill"></i> Head-to-head</h2>
          <p class="section-sub mb-0">Pick two people to see only the matches where their teams face each other.</p>
        </div>
        <button id="h2hClear" class="btn btn-sm btn-outline-light d-none">
          <i class="bi bi-x-lg"></i> Clear
        </button>
      </div>
      <div id="h2hPickers" class="h2h-pickers"></div>
      <div id="h2hSummary" class="h2h-summary d-none"></div>
    </div>
  </section>

  <!-- ===== Tabs ===== -->
  <section class="container-xl">
    <ul class="nav nav-pills view-tabs" id="viewTabs">
      <li class="nav-item">
        <button class="nav-link active" data-view="fixtures">
          <i class="bi bi-calendar2-event"></i> Fixtures &amp; Results
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-view="groups">
          <i class="bi bi-grid-3x3-gap-fill"></i> Groups
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-view="standings">
          <i class="bi bi-trophy"></i> Sweepstake table
        </button>
      </li>
    </ul>
  </section>

  <!-- ===== Fixtures view ===== -->
  <main class="container-xl pb-5">
    <div id="view-fixtures" class="view">
      <div class="filter-bar">
        <div class="filter-group">
          <label>Stage</label>
          <select id="stageFilter" class="form-select form-select-sm">
            <option value="all" selected>All stages</option>
            <option value="group">Group stage</option>
            <option value="r32">Round of 32</option>
            <option value="r16">Round of 16</option>
            <option value="qf">Quarter-finals</option>
            <option value="sf">Semi-finals</option>
            <option value="third">Third place</option>
            <option value="final">Final</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="statusFilter" class="form-select form-select-sm">
            <option value="all">All</option>
            <option value="live">Live now</option>
            <option value="finished">Finished</option>
            <option value="upcoming" selected>Upcoming</option>
          </select>
        </div>
        <div class="filter-group flex-grow-1">
          <label>Search team / person / scorer</label>
          <input id="searchInput" type="search" class="form-control form-control-sm" placeholder="e.g. Brazil, Olly, Messi…" />
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button id="resetFilters" class="btn btn-sm btn-outline-secondary w-100">Reset</button>
        </div>
      </div>
      <p class="filter-bar-desc">Use the filters above to narrow by stage or status, or search by team, person or scorer name.</p>
      <div id="matchCount" class="match-count"></div>
      <div id="fixtures" class="fixtures-wrap"></div>
    </div>

    <!-- ===== Groups view ===== -->
    <div id="view-groups" class="view d-none">
      <div id="groups" class="groups-wrap"></div>
    </div>

    <!-- ===== Standings view ===== -->
    <div id="view-standings" class="view d-none">
      <div id="standings" class="standings-wrap"></div>
    </div>
  </main>

  <footer class="app-footer">
  </footer>

  <div id="toast" class="app-toast"></div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
